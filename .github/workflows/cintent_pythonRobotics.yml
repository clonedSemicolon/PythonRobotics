# ===================================================================
# CIntent CallGraph — PythonRobotics
#
# Add this to your fork of AtsushiSakai/PythonRobotics:
#   .github/workflows/cintent-callgraph.yml
#
# Triggers: manual (workflow_dispatch)
# Artifacts: CIntent profiling logs (sysmonitor CSV + eBPF traces)
# ===================================================================

name: CIntent CallGraph

on:
  workflow_dispatch:

jobs:
  callgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # ── Project setup ────────────────────────────────────────
      - name: Install project dependencies
        run: |
          pip install -r requirements/requirements.txt

      # ── CIntent profiling ────────────────────────────────────
      - uses: clonedSemicolon/setup-cintent@main

      - name: Run tests
        run: pytest tests -v

      - name: Upload CIntent Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cintent-pythonrobotics
          path: ${{ env.CINTENT_LOGS }}
          retention-days: 30
