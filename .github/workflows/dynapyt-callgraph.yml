name: DynaPyt CallGraph
on:
  workflow_dispatch:

jobs:
  callgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install project ──────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements/requirements.txt

      # ── DynaPyt ──────────────────────────────────
      - uses: clonedSemicolon/seytup-dynapyt@master
        with:
          directory: PythonRobotics/             # e.g. schedule/, flask_api/

      # ── Run tests ───────────────────────────────
      - name: Run tests
        run: pytest tests -v              # e.g. pytest tests/, pytest test_schedule.py

      # ── Collect output ──────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynapyt-PROJECT_NAME
          path: dynapyt.json
          retention-days: 30
